apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
    jsonData:
      timeInterval: 5s

  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: market
    uid: timescaledb
    jsonData:
      database: market
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: market
